<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Portal Lincros</title>
    <link rel="icon" type="image/png" href="lincros-logo.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16162b 50%, #1a1a2e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            background: rgba(26, 26, 46, 0.95);
            border: 1px solid rgba(108, 63, 181, 0.3);
            border-radius: 18px;
            padding: 40px 36px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        @media (max-width: 480px) {
            body { padding: 14px; }
            .auth-card { padding: 28px 22px; border-radius: 14px; }
            .auth-logo .title { font-size: 18px; }
            .auth-subtitle { margin-bottom: 22px; }
            .field { margin-bottom: 14px; }
        }
        .auth-footer a { padding: 10px 6px; display: inline-block; } /* tap target maior pro "esqueci minha senha" */
        .auth-logo {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            margin-bottom: 12px;
        }
        .auth-logo img { width: 36px; height: 36px; }
        .auth-logo .title { font-size: 20px; font-weight: 700; color: #fff; }
        .auth-subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 13px;
            margin-bottom: 28px;
        }
        .field { margin-bottom: 16px; }
        .field label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .field input {
            width: 100%;
            background: rgba(15, 15, 30, 0.7);
            border: 1px solid rgba(108, 63, 181, 0.3);
            border-radius: 10px;
            padding: 13px 14px;
            color: #fff;
            font-size: 16px; /* 16px evita auto-zoom no iOS Safari */
            transition: border-color 0.2s;
            -webkit-appearance: none;
        }
        .field input:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
        }
        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, #6c3fb5, #8b5cf6);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            min-height: 48px; /* tap target Apple/Material */
            transition: transform 0.1s, box-shadow 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-primary:hover { box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4); }
        .btn-primary:active { transform: translateY(1px); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .auth-footer {
            margin-top: 22px;
            text-align: center;
            font-size: 13px;
        }
        .auth-footer a {
            color: #c4b5fd;
            text-decoration: none;
        }
        .auth-footer a:hover { text-decoration: underline; }
        .error-msg {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #fca5a5;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .success-msg {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.4);
            color: #6ee7b7;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-logo">
            <img src="lincros-logo.png" alt="" onerror="this.style.display='none'">
            <div class="title">Portal de Oportunidades</div>
        </div>
        <div class="auth-subtitle">Acesso restrito · Lincros</div>
        <div id="errorMsg" class="error-msg"></div>
        <form id="loginForm">
            <div class="field">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" required autocomplete="email" inputmode="email" autocapitalize="none" spellcheck="false">
            </div>
            <div class="field">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-primary" id="submitBtn">Entrar</button>
        </form>
        <div class="auth-footer">
            <a href="/forgot-password">Esqueci minha senha</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');
        const submitBtn = document.getElementById('submitBtn');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Entrando...';
            try {
                const r = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value.trim(),
                        password: document.getElementById('password').value
                    })
                });
                const data = await r.json();
                if (!r.ok) {
                    errorMsg.textContent = data.error || 'Falha no login';
                    errorMsg.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Entrar';
                    return;
                }
                if (data.user && data.user.mustChangePassword) {
                    window.location.href = '/change-password';
                } else {
                    window.location.href = '/';
                }
            } catch (err) {
                errorMsg.textContent = 'Erro de rede. Tente novamente.';
                errorMsg.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Entrar';
            }
        });
    </script>
</body>
</html>
