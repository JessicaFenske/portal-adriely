<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trocar senha — Portal Lincros</title>
    <link rel="icon" type="image/png" href="lincros-logo.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16162b 50%, #1a1a2e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            background: rgba(26, 26, 46, 0.95);
            border: 1px solid rgba(108, 63, 181, 0.3);
            border-radius: 18px;
            padding: 40px 36px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .auth-logo { display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:12px; }
        .auth-logo img { width: 36px; height: 36px; }
        .auth-logo .title { font-size: 20px; font-weight: 700; color: #fff; }
        .auth-subtitle { text-align: center; color: #94a3b8; font-size: 13px; margin-bottom: 8px; }
        .auth-hint {
            background: rgba(108, 63, 181, 0.15);
            border: 1px solid rgba(108, 63, 181, 0.3);
            color: #d8b4fe;
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 12.5px;
            margin: 18px 0 22px;
            line-height: 1.5;
        }
        .field { margin-bottom: 16px; }
        .field label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .field input {
            width: 100%;
            background: rgba(15, 15, 30, 0.7);
            border: 1px solid rgba(108, 63, 181, 0.3);
            border-radius: 10px;
            padding: 13px 14px;
            color: #fff;
            font-size: 16px; /* evita auto-zoom no iOS */
            -webkit-appearance: none;
        }
        .field input:focus { outline: none; border-color: #8b5cf6; box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15); }
        .field-hint { font-size: 12px; color: #94a3b8; margin-top: 4px; }
        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, #6c3fb5, #8b5cf6);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            min-height: 48px;
            -webkit-tap-highlight-color: transparent;
        }
        @media (max-width: 480px) {
            body { padding: 14px; }
            .auth-card { padding: 26px 20px; border-radius: 14px; }
            .auth-logo .title { font-size: 18px; }
            .auth-hint { padding: 10px 12px; font-size: 12px; margin: 16px 0 18px; }
            .field { margin-bottom: 14px; }
        }
        .btn-primary:hover { box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .error-msg, .success-msg {
            padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none;
        }
        .error-msg { background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.4); color: #fca5a5; }
        .success-msg { background: rgba(16, 185, 129, 0.15); border: 1px solid rgba(16, 185, 129, 0.4); color: #6ee7b7; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-logo">
            <img src="lincros-logo.png" alt="" onerror="this.style.display='none'">
            <div class="title">Trocar senha</div>
        </div>
        <div class="auth-subtitle" id="welcomeMsg">Carregando...</div>
        <div class="auth-hint">
            Por segurança, é necessário definir uma nova senha pessoal antes de continuar.
        </div>
        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>
        <form id="changeForm">
            <div class="field">
                <label for="currentPassword">Senha atual</label>
                <input type="password" id="currentPassword" required autocomplete="current-password" autofocus>
            </div>
            <div class="field">
                <label for="newPassword">Nova senha</label>
                <input type="password" id="newPassword" required minlength="8" autocomplete="new-password">
                <div class="field-hint">Mínimo 8 caracteres. Use letras, números e símbolos.</div>
            </div>
            <div class="field">
                <label for="confirmPassword">Confirmar nova senha</label>
                <input type="password" id="confirmPassword" required minlength="8" autocomplete="new-password">
            </div>
            <button type="submit" class="btn-primary" id="submitBtn">Salvar nova senha</button>
        </form>
    </div>

    <script>
        const form = document.getElementById('changeForm');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        const submitBtn = document.getElementById('submitBtn');

        // Validar sessão
        fetch('/auth/me').then(r => {
            if (!r.ok) { window.location.href = '/login'; return null; }
            return r.json();
        }).then(d => {
            if (d && d.user) document.getElementById('welcomeMsg').textContent = 'Olá, ' + d.user.name;
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            const newP = document.getElementById('newPassword').value;
            const confP = document.getElementById('confirmPassword').value;
            if (newP !== confP) {
                errorMsg.textContent = 'A confirmação da senha não confere.';
                errorMsg.style.display = 'block';
                return;
            }
            submitBtn.disabled = true;
            submitBtn.textContent = 'Salvando...';
            try {
                const r = await fetch('/auth/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        currentPassword: document.getElementById('currentPassword').value,
                        newPassword: newP
                    })
                });
                const data = await r.json();
                if (!r.ok) {
                    errorMsg.textContent = data.error || 'Falha ao trocar senha';
                    errorMsg.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Salvar nova senha';
                    return;
                }
                successMsg.textContent = 'Senha atualizada com sucesso. Redirecionando...';
                successMsg.style.display = 'block';
                setTimeout(() => { window.location.href = '/'; }, 1200);
            } catch (err) {
                errorMsg.textContent = 'Erro de rede. Tente novamente.';
                errorMsg.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Salvar nova senha';
            }
        });
    </script>
</body>
</html>
