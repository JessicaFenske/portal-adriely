name: Keep Portal Alive

# Pinga o portal do Render a cada 10 minutos para evitar que o servidor hiberne.
# O plano gratuito do Render desliga depois de 15 min sem requisicoes.

on:
  schedule:
    - cron: '*/10 * * * *'  # A cada 10 minutos
  workflow_dispatch: # Permite disparo manual

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Portal
        run: |
          echo "Pinging portal..."
          curl -fsS --max-time 60 "https://portal-de-oportunidades.onrender.com/keepalive" || echo "Ping failed but continuing"
          curl -fsS --max-time 60 "https://portal-de-oportunidades.onrender.com/status" | head -50 || true
          echo "Keep-alive OK"
